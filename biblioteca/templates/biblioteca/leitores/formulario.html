{% extends "biblioteca/base.html" %}

{% block titulo %}
{{ titulo }} | BiblioSys
{% endblock %}

{% block conteudo %}
<h2>{{ titulo }}</h2>

<form method="post">
    {% csrf_token %}

    {{ formulario.as_p }}

    <div class="acoes">
        <button class="botao" type="submit">
            Salvar
        </button>

        <a class="botao secundario" href="{% url 'listar_leitores' %}">
            Cancelar
        </a>
    </div>
</form>
{% endblock %}
