<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block titulo %}BiblioSys{% endblock %}</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        header {
            background-color: #16324f;
            color: white;
            padding: 20px 30px;
        }

        header h1 {
            margin: 0 0 15px;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 9px 14px;
            border-radius: 5px;
            background-color: #244f73;
        }

        nav a:hover {
            background-color: #326b99;
        }

        main {
            max-width: 1100px;
            margin: 30px auto;
            padding: 25px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .acoes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }

        .botao {
            display: inline-block;
            border: none;
            border-radius: 5px;
            padding: 10px 16px;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
        }

        .botao:hover {
            opacity: 0.9;
        }

        .editar {
            background-color: #d97706;
        }

        .excluir {
            background-color: #dc2626;
        }

        .secundario {
            background-color: #64748b;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .card {
            padding: 20px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f9fafb;
        }

        .card h3 {
            margin-top: 0;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #d1d5db;
            text-align: left;
        }

        th {
            background-color: #e5e7eb;
        }

        form p {
            margin-bottom: 18px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #9ca3af;
            border-radius: 5px;
            margin-top: 5px;
        }

        input[type="checkbox"] {
            width: auto;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }
    </style>
</head>

<body>
    <header>
        <h1>BiblioSys</h1>

        <nav>
            <a href="{% url 'home' %}">Início</a>
            <a href="{% url 'listar_obras' %}">Obras</a>
            <a href="{% url 'listar_leitores' %}">Leitores</a>
            <a href="/admin/">Administração</a>
        </nav>
    </header>

    <main>
        {% block conteudo %}
        {% endblock %}
    </main>

    <footer>
        BiblioSys — Sistema de Gestão de Biblioteca
    </footer>
</body>
</html>
