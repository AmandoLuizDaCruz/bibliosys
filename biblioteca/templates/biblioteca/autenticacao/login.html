{% extends "biblioteca/base.html" %}

{% block titulo %}
Entrar | BiblioSys
{% endblock %}

{% block conteudo %}
<div class="auth-shell">
    <div class="auth-card">
        <h2>Entrar</h2>

        <p>
            Acesse sua conta para continuar.
        </p>

        <form method="post" novalidate>
            {% csrf_token %}

            {{ formulario.as_p }}

            <button
                class="botao"
                type="submit"
            >
                Entrar
            </button>
        </form>

        <p style="margin-top: 22px; text-align: center;">
            Ainda não possui uma conta?

            <a href="{% url 'cadastro' %}">
                Criar conta
            </a>
        </p>
    </div>
</div>
{% endblock %}
