{% extends "biblioteca/base.html" %}
{% load static %}

{% block titulo %}
Criar conta | BiblioSys
{% endblock %}

{% block conteudo %}
<div class="cabecalho-pagina">
    <div>
        <h2>Criar conta</h2>

        <p>
            Contas de funcionário precisam ser aprovadas
            pelo administrador.
        </p>
    </div>
</div>

<form method="post" novalidate>
    {% csrf_token %}

    {{ formulario.as_p }}

    <div class="acoes">
        <button class="botao" type="submit">
            Criar conta
        </button>

        <a
            class="botao botao-secundario"
            href="{% url 'login' %}"
        >
            Voltar ao login
        </a>
    </div>
</form>

<script src="{% static 'biblioteca/js/mascaras.js' %}"></script>
{% endblock %}
